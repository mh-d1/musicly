<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music App</title>

  <link rel="stylesheet" href="style.css">

  <!-- Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>

<body>

<div class="container">
  
  <div class="sidebar">
    <h2>My Music</h2>
    <p>Home</p>
    <p>Search</p>
    <p>Library</p>
  </div>

  <div class="main">
    <h1>Playlist</h1>

    <div id="songList"></div>

  </div>
</div>

<div class="player">
  <div class="player-left">
    <img id="playerCover" src="" />
    <div>
      <div id="nowPlaying">No song</div>
      <div id="artistName"></div>
    </div>
  </div>

  <div class="player-center">
    <button onclick="prevSong()"><i class="fa fa-backward"></i></button>
    <button onclick="togglePlay()" id="playBtn"><i class="fa fa-play"></i></button>
    <button onclick="nextSong()"><i class="fa fa-forward"></i></button>
  </div>

  <div class="player-right">
    <input type="range" id="progress" value="0">
  </div>
</div>

<audio id="audio"></audio>

<script src="script.js"></script>

</body>
</html>
